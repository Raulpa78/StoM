name: Actualizar M3U

on:
  workflow_dispatch:   # Permite ejecutarlo manualmente desde GitHub
  schedule:
    - cron: "0 */12 * * *"   # Cada 12 horas

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run IPTV script
        env:
          IPTV_URL: ${{ secrets.IPTV_URL }}
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}
          SERIAL_NUMBER: ${{ secrets.SERIAL_NUMBER }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
          DEVICE_ID_2: ${{ secrets.DEVICE_ID_2 }}
        run: |
          python main.py

      - name: Commit updated vivo.m3u
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/vivo.m3u
          git commit -m "Actualización automática de vivo.m3u" || echo "No hay cambios"
          git push