name: macvod - IPTV VOD Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # Ejecuta cada día a las 03:00 (hora UTC)

jobs:
  run-macvod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Ejecutar script macvod.py
        env:
          IPTV_URL: ${{ secrets.IPTV_URL }}
          MAC_ADDRESS: ${{ secrets.MAC_ADDRESS }}
          SERIAL_NUMBER: ${{ secrets.SERIAL_NUMBER }}
          DEVICE_ID: ${{ secrets.DEVICE_ID }}
          DEVICE_ID_2: ${{ secrets.DEVICE_ID_2 }}
        run: |
          echo "Ejecutando script..."
          python macvod.py
          echo "Script finalizado."

      - name: Comprimir resultados por categoría
        run: |
          mkdir artifacts
          for d in posters_*; do
            zip -r "artifacts/${d}.zip" "$d"
          done
          for f in *.m3u; do
            cp "$f" artifacts/
          done

      - name: Subir artefactos generados
        uses: actions/upload-artifact@v4
        with:
          name: macvod-output
          path: artifacts/

      - name: Limpiar artefactos locales
        run: |
          rm -rf posters_*
          rm -rf *.m3u
          rm -rf artifacts